<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot Recognition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/index.css">
</head>

<body>
    <header class="app-header">
        <div class="header-inner">
            <span class="app-brand">Spot Recognition</span>
        </div>
    </header>

    <main class="main-layout">
        <!-- Form Panel -->
        <aside class="form-panel">
            <div class="panel-label">New Entry</div>
            <form id="sr_form">
                <div class="field-group">
                    <label for="left_image">Winner Photo <span class="req">*</span></label>
                    <div class="file-input-wrapper">
                        <input type="file" id="left_image" name="leftImage" accept="image/*">
                        <div class="file-input-placeholder">
                            <svg class="upload-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <span class="file-text">Choose photo</span>
                        </div>
                    </div>
                </div>

                <div class="field-group">
                    <label for="spot_winner_name">Winner Name <span class="req">*</span></label>
                    <input type="text" id="spot_winner_name" name="spotWinnerName" placeholder="e.g. Jane Smith">
                </div>

                <div class="field-group">
                    <label for="spot_sender_name">Given By <span class="req">*</span></label>
                    <input type="text" id="spot_sender_name" name="spotSenderName" placeholder="e.g. John Manager">
                </div>

                <div class="field-group">
                    <label for="spot_description">Recognition <span class="req">*</span></label>
                    <textarea id="spot_description" name="description" placeholder="Describe the achievement..." rows="2"></textarea>
                </div>

                <div class="field-group">
                    <label>Badges</label>
                    <div class="badge-multiselect" id="badge_selector">
                        <div class="badge-multiselect-display" onclick="toggleBadgeDropdown()">
                            <span class="badge-placeholder">Choose badges...</span>
                            <svg class="badge-arrow" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                        <div class="badge-multiselect-dropdown" id="badge_dropdown">
                            <div class="badge-option" data-value="brain-wave" data-image="brain-wave.png">
                                <div class="badge-option-content">
                                    <img src="./assets/images/brain-wave.png" alt="Brain Wave" class="badge-icon">
                                    <span class="badge-label">Brain Wave</span>
                                </div>
                                <span class="badge-checkbox">☐</span>
                            </div>
                            <div class="badge-option" data-value="calmer-of-storms" data-image="calmer-of-storms.png">
                                <div class="badge-option-content">
                                    <img src="./assets/images/calmer-of-storms.png" alt="Calmer of Storms" class="badge-icon">
                                    <span class="badge-label">Calmer of Storms</span>
                                </div>
                                <span class="badge-checkbox">☐</span>
                            </div>
                            <div class="badge-option" data-value="cool-cucumber" data-image="cool-cucumber.png">
                                <div class="badge-option-content">
                                    <img src="./assets/images/cool-cucumber.png" alt="Cool Cucumber" class="badge-icon">
                                    <span class="badge-label">Cool Cucumber</span>
                                </div>
                                <span class="badge-checkbox">☐</span>
                            </div>
                            <div class="badge-option" data-value="high-five" data-image="high-five.png">
                                <div class="badge-option-content">
                                    <img src="./assets/images/high-five.png" alt="High Five" class="badge-icon">
                                    <span class="badge-label">High Five</span>
                                </div>
                                <span class="badge-checkbox">☐</span>
                            </div>
                            <div class="badge-option" data-value="juggler" data-image="juggler.png">
                                <div class="badge-option-content">
                                    <img src="./assets/images/juggler.png" alt="Juggler" class="badge-icon">
                                    <span class="badge-label">Juggler</span>
                                </div>
                                <span class="badge-checkbox">☐</span>
                            </div>
                            <div class="badge-option" data-value="out-of-box" data-image="out-of-box.png">
                                <div class="badge-option-content">
                                    <img src="./assets/images/out-of-box.png" alt="Out of Box" class="badge-icon">
                                    <span class="badge-label">Out of Box</span>
                                </div>
                                <span class="badge-checkbox">☐</span>
                            </div>
                            <div class="badge-option" data-value="rockstar" data-image="rockstar.png">
                                <div class="badge-option-content">
                                    <img src="./assets/images/rockstar.png" alt="Rockstar" class="badge-icon">
                                    <span class="badge-label">Rockstar</span>
                                </div>
                                <span class="badge-checkbox">☐</span>
                            </div>
                        </div>
                        <div class="selected-badges" id="selected_badges"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="reset" class="btn btn-ghost">Reset</button>
                    <button type="button" class="btn btn-primary" onclick="submitForm()">Add Entry</button>
                </div>
            </form>
        </aside>

        <!-- Content Panel -->
        <section class="content-panel">
            <div class="content-header">
                <h2 class="content-title">Entries</h2>
                <span class="entry-badge" id="entry-count">0 entries</span>
            </div>

            <div class="table-scroll">
                <table class="sr-table">
                    <thead>
                        <tr>
                            <th class="col-num">#</th>
                            <th class="col-photo">Photo</th>
                            <th>Winner</th>
                            <th>Recognition</th>
                            <th>Given By</th>
                            <th>Badges</th>
                            <th class="col-actions"></th>
                        </tr>
                    </thead>
                    <tbody class="table-body"></tbody>
                </table>
            </div>

            <!-- Generate Bar -->
            <div class="generate-bar">
                <div class="date-row">
                    <div class="date-field">
                        <label for="start_date">From</label>
                        <input type="date" id="start_date" name="startDate">
                    </div>
                    <div class="date-field">
                        <label for="end_date">To</label>
                        <input type="date" id="end_date" name="endDate">
                    </div>
                </div>
                <button class="btn btn-generate" onclick="generateImage()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    Generate Image
                </button>
            </div>
        </section>
    </main>

    <!-- Wall of Fame Preview Modal -->
    <div class="modal-overlay" id="preview-modal">
        <div class="preview-modal">
            <div class="preview-modal-header">
                <span class="preview-modal-title">Wall of Fame Preview</span>
                <button class="icon-btn" onclick="closePreviewModal()" title="Close">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="preview-modal-body">
                <img id="preview-img" src="" alt="Wall of Fame Preview">
            </div>
            <div class="preview-modal-footer">
                <button class="btn btn-ghost" onclick="closePreviewModal()">Close</button>
                <button class="btn btn-primary" onclick="downloadPreviewImage()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Save Image
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden Wall of Fame (html2canvas target) -->
    <section class="email-image-container">
        <div class="email-image" id="email_image">
            <div class="wall-of-fame">
                <div class="wall-of-fame-header">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 162.14 25.68" height="20">
                        <defs>
                            <style>.cls-1 { fill: #fff; }</style>
                        </defs>
                        <g id="Layer_2" data-name="Layer 2">
                            <g id="Layer_1-2" data-name="Layer 1">
                                <rect x="5.21" y="10.35" width="3.3" height="3.3" fill="#00af9a" />
                                <polygon class="cls-1" points="0 3.83 0 10.35 3.32 10.35 3.32 7 10.76 7 10.76 3.83 0 3.83" />
                                <rect class="cls-1" y="13.65" width="3.33" height="6.53" />
                                <rect class="cls-1" x="85.18" y="3.83" width="3.08" height="2.88" />
                                <path class="cls-1" d="M26.69,9.33V8.14h-3v12h3.09V14.27a3.67,3.67,0,0,1,.77-2.62,3.46,3.46,0,0,1,3-.75v-3a4,4,0,0,0-3.88,1.42" />
                                <path class="cls-1" d="M37.15,17.66a3.3,3.3,0,0,1-3.09-3.46,3.36,3.36,0,0,1,3.09-3.53,2.85,2.85,0,0,1,2.49,1.52h3.3a5.64,5.64,0,0,0-5.8-4.35A6.16,6.16,0,0,0,30.93,14v.22a6.12,6.12,0,0,0,6,6.29h.26A5.64,5.64,0,0,0,43,16.11H39.67a2.85,2.85,0,0,1-2.52,1.55" />
                                <path class="cls-1" d="M50.18,7.84a6.31,6.31,0,0,0,0,12.62,5.7,5.7,0,0,0,5.7-3.77h-3.4a2.87,2.87,0,0,1-2.32,1.06,3.07,3.07,0,0,1-3-2.39h9.1c.44-4.76-2.5-7.52-6-7.52m-3,5a3.06,3.06,0,0,1,3-2.29,3,3,0,0,1,3,2.29Z" />
                                <rect class="cls-1" x="85.18" y="8.14" width="3.08" height="12.04" />
                                <path class="cls-1" d="M96.07,7.84A4,4,0,0,0,93,9.31V8.14H90v12H93.1v-7a2.29,2.29,0,0,1,2.17-2.38h.17a2.14,2.14,0,0,1,2.24,2.38v7h3.09v-7c0-3.17-1.87-5.3-4.7-5.3" />
                                <path class="cls-1" d="M105.41,15.13V10.88h2.19V8.13h-2.19V5.39h-3.09v9.72c0,3.29,1.87,5.42,5.4,5.05V17.35c-1.54.09-2.31-.55-2.31-2.22" />
                                <path class="cls-1" d="M16,7.84a6.31,6.31,0,1,0,6.31,6.31h0A6.3,6.3,0,0,0,16,7.84m0,9.78A3.49,3.49,0,1,1,19.36,14v.1A3.43,3.43,0,0,1,16,17.62h0" />
                                <path class="cls-1" d="M77.58,7.84a6.31,6.31,0,1,0,6.31,6.31,6.31,6.31,0,0,0-6.31-6.31m0,9.79A3.48,3.48,0,1,1,81,14.05v.1a3.43,3.43,0,0,1-3.38,3.47" />
                                <path class="cls-1" d="M64.33,7.86a5.11,5.11,0,0,0-3.67,1.52V8.12h-3V24.34h3.11V19a5,5,0,0,0,3.53,1.43c3.15,0,5.72-2.75,5.72-6.31s-2.57-6.27-5.72-6.27m-.45,9.7a3.27,3.27,0,0,1-3.08-3.43,3.26,3.26,0,0,1,3.08-3.4A3.21,3.21,0,0,1,67,14.13a3.24,3.24,0,0,1-3.09,3.43" />
                            </g>
                        </g>
                    </svg>
                    <div style="text-align: center;">
                        <h1>Wall of Fame</h1>
                    </div>
                    <div id="date_section"></div>
                </div>
                <div id="mediaContainer"></div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="./assets/js/script.js"></script>
</body>

</html>
